services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  mongo:
    image: mongo:7
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - mongo
    environment:
      MPP_PORT: "8080"
      MPP_REDIS_URL: "redis://redis:6379"
      MPP_MONGO_URL: "mongodb://mongo:27017"
      MPP_MONGO_DB: "mpp"
      MPP_PUZZLE_ID: "${MPP_PUZZLE_ID:-test-puzzle-10k}"
      MPP_ASSETS_BASE_URL: "${MPP_ASSETS_BASE_URL:-https://assets.millionpiecepuzzle.com}"
      # Comma-separated list of allowed Origin headers. Unset = wildcard (dev
      # only, with a boot warning). Set to your frontend origin(s) in prod.
      MPP_ALLOWED_ORIGINS: "${MPP_ALLOWED_ORIGINS:-}"
      # Non-secret auth config, defaulted for a local run.
      AUTH_URL: "${AUTH_URL:-http://localhost:8080}"
      AUTH_TRUST_HOST: "true"
      AUTH_COOKIE_DOMAIN: "${AUTH_COOKIE_DOMAIN:-}"
      MPP_APP_ORIGIN: "${MPP_APP_ORIGIN:-http://localhost:5173}"
      # Auth secrets: never committed, passed through from the host environment
      # (set them before `docker compose up`). Without them the server boots and
      # spectator mode works, but contributor sign-in is unavailable.
      AUTH_SECRET: "${AUTH_SECRET:-}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-}"
    expose:
      - "8080"

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_WS_URL: "${VITE_WS_URL:-}"
      VITE_AUTH_BASE_URL: "${VITE_AUTH_BASE_URL:-}"
      MPP_ALLOWED_HOSTS: "${MPP_ALLOWED_HOSTS:-}"
    expose:
      - "5173"

volumes:
  redis-data:
  mongo-data:
