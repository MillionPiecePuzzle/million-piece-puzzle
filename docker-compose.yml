services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  mongo:
    image: mongo:7
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - mongo
    environment:
      MPP_PORT: "8080"
      MPP_REDIS_URL: "redis://redis:6379"
      MPP_MONGO_URL: "mongodb://mongo:27017"
      MPP_MONGO_DB: "mpp"
      # Non-secret app config (puzzle id, asset base, auth host/cookie/origin,
      # Origin allowlist) is baked as prod ENV in packages/server/Dockerfile.
      # docker-compose.override.yml overrides it with localhost values for local
      # dev. This file is what Coolify deploys, so it must not re-declare those
      # keys: a compose `environment:` entry overrides the image ENV, which would
      # silently shadow the baked prod values.
      # Auth secrets: never committed, passed through from the host environment
      # (a local `.env` for `docker compose up`, the Coolify service env in prod).
      # Without them the server boots and spectator mode works, but contributor
      # sign-in is unavailable.
      AUTH_SECRET: "${AUTH_SECRET:-}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-}"
    expose:
      - "8080"

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_WS_URL: "${VITE_WS_URL:-}"
      VITE_AUTH_BASE_URL: "${VITE_AUTH_BASE_URL:-}"
      MPP_ALLOWED_HOSTS: "${MPP_ALLOWED_HOSTS:-}"
    expose:
      - "5173"

volumes:
  redis-data:
  mongo-data:
