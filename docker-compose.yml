services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  mongo:
    image: mongo:7
    restart: unless-stopped
    # Cap WiredTiger so Mongo does not grab ~50% of RAM and collide with the Node
    # heap on the co-located 12 GB box.
    command: ["mongod", "--wiredTigerCacheSizeGB", "1.0"]
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - mongo
    environment:
      MPP_PORT: "8080"
      MPP_REDIS_URL: "redis://redis:6379"
      MPP_MONGO_URL: "mongodb://mongo:27017"
      MPP_MONGO_DB: "mpp"
      # Non-secret runtime config (per-IP WS cap, Node heap, event start) is baked
      # as prod ENV in packages/server/Dockerfile, not passed through here: the
      # Coolify service env holds only secrets. The per-IP cap falls back to its
      # code default (10); the load harness drives >cap bots via --spoof-ip-base.
      # Non-secret app config (puzzle id, asset base, auth host/cookie/origin,
      # Origin allowlist) is baked as prod ENV in packages/server/Dockerfile.
      # docker-compose.override.yml overrides it with localhost values for local
      # dev. This file is what Coolify deploys, so it must not re-declare those
      # keys: a compose `environment:` entry overrides the image ENV, which would
      # silently shadow the baked prod values.
      # Generation seed: the anti-programmatic-solving secret (drives geometry, the
      # scatter, and the wire id permutation), so it is never committed. Passed
      # through from the Coolify service env in prod; docker-compose.override.yml
      # supplies the public alpha value for local dev. The server fails fast if it
      # resolves empty, so a forgotten prod secret stops the boot rather than
      # silently using a publicly derivable permutation.
      MPP_GENERATION_SEED: "${MPP_GENERATION_SEED:-}"
      # Auth secrets: never committed, passed through from the host environment
      # (a local `.env` for `docker compose up`, the Coolify service env in prod).
      # Without AUTH_SECRET the /auth routes fail (sessions unreadable by the
      # SPA); without the Google credentials only Google sign-in is unavailable,
      # guest play still works.
      AUTH_SECRET: "${AUTH_SECRET:-}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-}"
      # Admin page: the shared password gates the direct-URL /admin (empty, the
      # default, leaves it unmounted), and the puzzle switch list carries each
      # puzzle's secret seed. Both are secrets, so they are passed through from the
      # Coolify env like the auth secrets, never baked into the committed image.
      MPP_ADMIN_PASSWORD: "${MPP_ADMIN_PASSWORD:-}"
      MPP_ADMIN_PUZZLES: "${MPP_ADMIN_PUZZLES:-}"
      # Cell compositor write credentials (see ROADMAP Phase 5 Stage 3): the
      # server's one live write path to R2, passed through like the secrets
      # above. All three unset (local dev's default) leaves compositing inert
      # rather than failing the boot; the bucket is the existing public asset
      # bucket (non-secret, so fixed here, same as MPP_BACKUP_BUCKET below).
      MPP_R2_ENDPOINT: "${MPP_R2_ENDPOINT:-}"
      MPP_R2_ACCESS_KEY_ID: "${MPP_R2_ACCESS_KEY_ID:-}"
      MPP_R2_SECRET_ACCESS_KEY: "${MPP_R2_SECRET_ACCESS_KEY:-}"
      MPP_R2_BUCKET: "mpp-assets"
    expose:
      - "8080"

  # The frontend is not deployed here: prod app.millionpiecepuzzle.com is served
  # by Cloudflare Pages (a production build that reads
  # packages/frontend/.env.production). A Vite dev server for local development
  # lives in docker-compose.override.yml, which Coolify does not deploy.

  # Off-host backups: a gzipped Mongo dump + Redis RDB pushed to a private R2
  # bucket every 6h, kept to the newest 3 (see DECISIONS: scheduled backups to a
  # private R2 bucket). docker-compose.override.yml disables the loop for local
  # dev (no R2 creds there).
  backup:
    build:
      context: .
      dockerfile: docker/backup/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - mongo
    environment:
      MPP_REDIS_URL: "redis://redis:6379"
      MPP_MONGO_URL: "mongodb://mongo:27017"
      MPP_MONGO_DB: "mpp"
      # Cadence and retention: non-secret, baked here as the prod source.
      MPP_BACKUP_INTERVAL_SEC: "21600"
      MPP_BACKUP_KEEP: "3"
      MPP_BACKUP_REMOTE: "r2"
      RCLONE_CONFIG_R2_TYPE: "s3"
      RCLONE_CONFIG_R2_PROVIDER: "Cloudflare"
      RCLONE_CONFIG_R2_ACL: "private"
      # R2 credentials for the private backup target come from the Coolify service
      # env, never committed: the endpoint carries the account id and the keys are
      # secrets. Without them the backup loop logs failures and the app is
      # unaffected. The bucket name is non-secret, so it is fixed here.
      MPP_BACKUP_BUCKET: "mpp-backups"
      RCLONE_CONFIG_R2_ENDPOINT: "${RCLONE_CONFIG_R2_ENDPOINT:-}"
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: "${RCLONE_CONFIG_R2_ACCESS_KEY_ID:-}"
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: "${RCLONE_CONFIG_R2_SECRET_ACCESS_KEY:-}"

volumes:
  redis-data:
  mongo-data:
