services:
  redis:
    ports:
      - "6379:6379"

  mongo:
    ports:
      - "27017:27017"

  server:
    ports:
      - "8080:8080"
    # Local-dev values for the non-secret config baked as prod ENV in
    # packages/server/Dockerfile. docker compose auto-merges this override for
    # local runs; Coolify deploys docker-compose.yml alone, so prod keeps the
    # image ENV. Override any of these via this directory's `.env`.
    environment:
      # The snapshot rebuild reads the whole board into memory transiently and the
      # live working set is large, so at 1M pieces it exceeds Node's default ~2 GB
      # heap. Raise it for a local 1M run; the Docker VM has room. Harmless for the
      # small test puzzle. (Prod runs the committed image CMD, so the real 1M deploy
      # needs the same treatment.)
      NODE_OPTIONS: "${NODE_OPTIONS:---max-old-space-size=5120}"
      # Which R2-hosted puzzle the dev server serves. Defaults to synthetic-1m,
      # the same 1M puzzle prod serves; override via this directory's `.env` (with
      # a matching MPP_GENERATION_SEED) to serve another uploaded puzzle locally.
      MPP_PUZZLE_ID: "${MPP_PUZZLE_ID:-synthetic-1m}"
      # Seed for the wire-id permutation: must match the R2 assets the dev server
      # fetches. synthetic-1m is a throwaway synthetic puzzle, so its seed is not a
      # real secret and is fine to default here (authoritative value: the Coolify
      # service env MPP_GENERATION_SEED). Override via `.env` if you slice your own
      # local puzzle. Prod never reads this file (Coolify deploys docker-compose.yml
      # alone and supplies the real seed as a service secret).
      MPP_GENERATION_SEED: "${MPP_GENERATION_SEED:-synthetic-1m}"
      MPP_ALLOWED_ORIGINS: "${MPP_ALLOWED_ORIGINS:-}"
      AUTH_URL: "${AUTH_URL:-http://localhost:8080}"
      AUTH_COOKIE_DOMAIN: "${AUTH_COOKIE_DOMAIN:-}"
      MPP_APP_ORIGIN: "${MPP_APP_ORIGIN:-http://localhost:5173}"
      # Admin page for local dev: a throwaway password (visit http://localhost:8080/admin)
      # and the synthetic puzzles as switch targets (their seeds are not real secrets,
      # each seed equals its id). Prod values come from the Coolify env. Override either
      # via this directory's `.env`.
      MPP_ADMIN_PASSWORD: "${MPP_ADMIN_PASSWORD:-admin}"
      MPP_ADMIN_PUZZLES: '${MPP_ADMIN_PUZZLES:-[{"id":"synthetic-1m","label":"Synthetic 1M","seed":"synthetic-1m"},{"id":"synthetic-25","label":"Synthetic 25","seed":"synthetic-25"}]}'

  # Local-dev only: the Vite dev server, bind-mounting the frontend source for
  # HMR on :5173. It lives here, not in docker-compose.yml, because prod
  # app.millionpiecepuzzle.com is served by Cloudflare Pages, so Coolify (which
  # deploys docker-compose.yml alone) must neither build nor run it.
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_WS_URL: "${VITE_WS_URL:-}"
      VITE_AUTH_BASE_URL: "${VITE_AUTH_BASE_URL:-}"
      MPP_ALLOWED_HOSTS: "${MPP_ALLOWED_HOSTS:-}"
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend/src:/repo/packages/frontend/src:ro
      - ./packages/frontend/index.html:/repo/packages/frontend/index.html:ro
      - ./packages/frontend/vite.config.ts:/repo/packages/frontend/vite.config.ts:ro

  # No R2 creds locally, so idle the backup loop instead of failing every pass.
  backup:
    environment:
      MPP_BACKUP_ENABLED: "0"
