services:
  redis:
    ports:
      - "6379:6379"
    # Auth off for local dev (prod adds --requirepass via REDIS_PASSWORD).
    command: ["redis-server", "--appendonly", "yes"]

  mongo:
    ports:
      - "27017:27017"
    # Auth off for local dev (prod runs mongod --auth with root creds).
    command: ["mongod", "--wiredTigerCacheSizeGB", "1.0"]

  server:
    ports:
      - "8080:8080"
    # Local-dev values for the non-secret config baked as prod ENV in
    # packages/server/Dockerfile. docker compose auto-merges this override for
    # local runs; Coolify deploys docker-compose.yml alone, so prod keeps the
    # image ENV. Override any of these via this directory's `.env`.
    environment:
      # Auth off for local dev: connect to the unauthenticated local Mongo/Redis
      # above (prod embeds creds in these URLs from the Coolify service env).
      MPP_REDIS_URL: "${MPP_REDIS_URL:-redis://redis:6379}"
      MPP_MONGO_URL: "${MPP_MONGO_URL:-mongodb://mongo:27017}"
      # The in-memory keyframe snapshot holds the whole board (and is retained), so
      # at 1M pieces it exceeds Node's default ~2 GB heap. Raise it for a local 1M
      # run; the Docker VM has room. Harmless for the small test puzzle. (Prod runs
      # the committed image CMD, so the real 1M deploy needs the same treatment.)
      NODE_OPTIONS: "${NODE_OPTIONS:---max-old-space-size=5120}"
      # Which R2-hosted puzzle the dev server serves. Defaults to the image's
      # test-puzzle-10k; override via this directory's `.env` (with a matching
      # MPP_GENERATION_SEED) to serve another uploaded puzzle locally.
      MPP_PUZZLE_ID: "${MPP_PUZZLE_ID:-test-puzzle-10k}"
      # Local dev defaults to the public alpha seed: it matches the test-puzzle-10k
      # R2 assets the dev server fetches. Override via this directory's `.env` if
      # you slice your own local puzzle. Prod never uses this file (Coolify deploys
      # docker-compose.yml alone and supplies the real seed as a service secret).
      MPP_GENERATION_SEED: "${MPP_GENERATION_SEED:-test-puzzle-10k-2026}"
      MPP_ALLOWED_ORIGINS: "${MPP_ALLOWED_ORIGINS:-}"
      AUTH_URL: "${AUTH_URL:-http://localhost:8080}"
      AUTH_COOKIE_DOMAIN: "${AUTH_COOKIE_DOMAIN:-}"
      MPP_APP_ORIGIN: "${MPP_APP_ORIGIN:-http://localhost:5173}"

  # Local-dev only: the Vite dev server, bind-mounting the frontend source for
  # HMR on :5173. It lives here, not in docker-compose.yml, because prod
  # app.millionpiecepuzzle.com is served by Cloudflare Pages, so Coolify (which
  # deploys docker-compose.yml alone) must neither build nor run it.
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_WS_URL: "${VITE_WS_URL:-}"
      VITE_AUTH_BASE_URL: "${VITE_AUTH_BASE_URL:-}"
      MPP_ALLOWED_HOSTS: "${MPP_ALLOWED_HOSTS:-}"
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend/src:/repo/packages/frontend/src:ro
      - ./packages/frontend/index.html:/repo/packages/frontend/index.html:ro
      - ./packages/frontend/vite.config.ts:/repo/packages/frontend/vite.config.ts:ro

  # No R2 creds locally, so idle the backup loop instead of failing every pass.
  backup:
    environment:
      MPP_BACKUP_ENABLED: "0"
